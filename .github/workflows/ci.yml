name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  php-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, pdo_sqlite, curl, json, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax check
        run: |
          find config services public/api routes resources scripts -name '*.php' -print0 | xargs -0 -n1 -P 4 php -l > /dev/null
          php -l index.php > /dev/null
          php -l run_migrations.php > /dev/null

      - name: JavaScript syntax check
        run: |
          for f in public/js/*.js; do
            node --check "$f"
          done

      - name: PHPUnit
        run: vendor/bin/phpunit --no-coverage
